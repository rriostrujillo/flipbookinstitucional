<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlipBook - Visor de Documentos</title>
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="header" id="header">
      <h1 class="title" id="document-title">FlipBook</h1>
      <div class="page-counter" id="page-counter">Página 1 de 1</div>
    </header>

    <main class="viewer-container" id="viewer-container">
      <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <p>Cargando documento...</p>
      </div>

      <div class="flipbook-wrapper" id="flipbook-wrapper">
        <div id="flipbook"></div>
      </div>

      <div class="error-message" id="error-message" style="display: none;">
        <p>Error al cargar el documento</p>
        <button id="retry-btn">Reintentar</button>
      </div>
    </main>

    <footer class="controls" id="controls">
      <div class="controls-left">
        <button class="control-btn" id="prev-btn" title="Página anterior">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      </div>

      <div class="controls-center">
        <input type="range" class="page-slider" id="page-slider" min="1" max="1" value="1">
        <span class="page-input-wrap">
          <input type="number" class="page-input" id="page-input" min="1" max="1" value="1">
        </span>
      </div>

      <div class="controls-right">
        <button class="control-btn" id="next-btn" title="Página siguiente">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>

      <div class="controls-zoom">
        <button class="control-btn" id="zoom-out-btn" title="Alejar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="8" y1="11" x2="14" y2="11"></line>
          </svg>
        </button>
        <span class="zoom-level" id="zoom-level">100%</span>
        <button class="control-btn" id="zoom-in-btn" title="Acercar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="11" y1="8" x2="11" y2="14"></line>
            <line x1="8" y1="11" x2="14" y2="11"></line>
          </svg>
        </button>
      </div>

      <div class="controls-extras">
        <button class="control-btn" id="fullscreen-btn" title="Pantalla completa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 3 21 3 21 9"></polyline>
            <polyline points="9 21 3 21 3 15"></polyline>
            <line x1="21" y1="3" x2="14" y2="10"></line>
            <line x1="3" y1="21" x2="10" y2="14"></line>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
